# design.yaml — Fix config for design-doc.md

layer: design
display_name: "Design Document"
target: design/design-doc.md
target_type: fixed
template: "scaffold/templates/design-doc-template.md"

preflight:
  required_files:
    - design/design-doc.md
    - design/glossary.md
  blocked_message: "No design doc found. Run `/scaffold-init-design` first."

context:
  budget: 20000

  base:
    - file: design/design-doc.md
      class: canonical
      sections: ["## Identity", "## Shape", "## Control", "## World", "## Presentation", "## Content", "## Simulation Requirements", "## Philosophy", "## Scope", "### Design Invariants", "### Decision Anchors", "### Design Pressure Tests"]
      priority: 1
    - file: design/glossary.md
      class: constraint
      sections: ["## Terms"]
      priority: 2
    - file: design/systems/_index.md
      class: adjacent
      priority: 3

  on_demand:
    - file: decisions/known-issues.md
      class: evidence
      priority: 4
    - file: scaffold/doc-authority.md
      class: constraint
      priority: 5

editable_files:
  - design/design-doc.md

defaults:
  max_iterations: 10

mechanical_checks:

  completeness:
    - id: missing_sections
      description: "Required section from init-design structure is absent"
      detection: template_diff
      auto_fix: true
      fix_action: "Add empty stub with section heading"

    - id: template_text
      description: "TODO or template placeholder still present"
      detection: pattern_match
      patterns: ["<!-- TODO:", "*TODO:"]
      auto_fix: true
      fix_action: "Replace with content derived from existing sections or authoritative docs"

    - id: provisional_markers
      description: "PROVISIONAL markers on sections with substantive content"
      detection: marker_with_content
      pattern: "<!-- PROVISIONAL"
      min_content_length: 50
      auto_fix: true
      fix_action: "Remove PROVISIONAL marker"

  governance_format:
    - id: incomplete_invariant
      description: "Invariant has Rule but missing Reason or Implication"
      detection: governance_field_check
      section: "### Design Invariants"
      required_fields: ["Invariant:", "Rule:", "Reason:", "Implication:"]
      auto_fix: true
      condition: "Derivable unambiguously from rule text"
      fix_action: "Add missing fields derived from context"

    - id: incomplete_pressure_test
      description: "Pressure Test missing Scenario, Expectation, or Failure Signal"
      detection: governance_field_check
      section: "### Design Pressure Tests"
      required_fields: ["Pressure Test:", "Scenario:", "Expectation:", "Failure Signal:"]
      auto_fix: true
      condition: "Derivable unambiguously from test name"
      fix_action: "Add missing fields derived from test name"

    - id: malformed_anchor
      description: "Decision Anchor not in 'X over Y' format"
      detection: governance_format_check
      section: "### Decision Anchors"
      expected_pattern: ".+\\s+over\\s+.+"
      auto_fix: false
      fix_action: "Flag malformed anchor for user to rewrite in 'X over Y' format"

  structured_content:
    - id: verb_table_incomplete
      description: "Player Verbs table row missing Input, Target, or Outcome"
      detection: table_column_check
      section: "### Player Verbs"
      required_columns: ["Verb", "Input", "Target", "Outcome"]
      auto_fix: false
      fix_action: "Flag incomplete rows for user to fill"

    - id: state_table_incomplete
      description: "State That Matters table row missing columns"
      detection: table_column_check
      section: "### State That Matters"
      required_columns: ["State Domain", "What Changes", "Player Sees", "Consequence If Ignored"]
      auto_fix: false
      fix_action: "Flag incomplete rows for user to fill"

    - id: entity_presentation_incomplete
      description: "Entity Presentation table row missing Visual, Animation, or Sound identity"
      detection: table_column_check
      section: "### Entity Presentation"
      required_columns: ["Entity / Category", "Visual Identity", "Animation Set", "Sound Identity"]
      auto_fix: false
      fix_action: "Flag incomplete rows for user to fill"

    - id: control_model_missing_tiers
      description: "Player Control Model doesn't define all three tiers"
      detection: pattern_present_all
      section: "### Player Control Model"
      patterns: ["[Dd]irect", "[Ii]ndirect", "[Nn]o control"]
      auto_fix: false
      fix_action: "Flag missing control tier for user to define"

    - id: failure_philosophy_incomplete
      description: "Failure Philosophy missing key aspects"
      detection: pattern_present_any
      section: "### Failure Philosophy"
      expected_concepts: ["severity", "recovery", "cascad", "teach|learn", "signal|warning"]
      min_concepts: 3
      auto_fix: false
      fix_action: "Flag missing failure aspects for user to address"

    - id: info_model_missing_hierarchy
      description: "Player Information Model doesn't define information tiers"
      detection: pattern_present_any
      section: "### Player Information Model"
      expected_concepts: ["[Cc]ritical|[Aa]lways visible", "[Ss]upplementary|[Oo]n demand", "[Dd]iscoverable|[Hh]idden|[Ee]arned", "[Oo]paque|[Nn]ever see"]
      min_concepts: 2
      auto_fix: false
      fix_action: "Flag that information hierarchy is undefined"

  contracts:
    - id: failure_contract_missing
      description: "Failure Philosophy has no enforceable contract"
      detection: pattern_present_any
      section: "### Failure Philosophy"
      expected_concepts: ["MUST have|must have|Every failure", "MUST NOT|must not|must never|No failure may", "[Tt]estability|[Rr]econstruct|[Vv]erif"]
      min_concepts: 2
      auto_fix: false
      fix_action: "Flag that Failure Philosophy lacks enforceable contract rules (MUST/MUST NOT/testability)"

    - id: risk_contract_missing
      description: "Risk/Reward Philosophy has no enforceable contract"
      detection: pattern_present_any
      section: "### Risk / Reward Philosophy"
      expected_concepts: ["MUST generate|must generate|always.*risk", "MUST NEVER|must never|never.*risk", "[Gg]uarantee|[Dd]ecay|[Aa]ttribut"]
      min_concepts: 2
      auto_fix: false
      fix_action: "Flag that Risk/Reward Philosophy lacks enforceable contract rules (MUST/MUST NEVER/guarantees)"

  terminology:
    - id: glossary_compliance
      description: "NOT-column term used as authoritative terminology"
      detection: glossary_not_column
      auto_fix: true
      fix_action: "Replace with canonical term"

  layer_leak:
    - id: system_naming_in_sim_req
      description: "Simulation Requirements names specific systems instead of describing requirements"
      detection: pattern_match_in_section
      section: "## Simulation Requirements"
      patterns: ["\\w+ System", "\\w+System"]
      auto_fix: false
      fix_action: "Flag system name for user to rewrite as a requirement (what the simulation must do, not which system does it)"

  cross_reference:
    - id: system_index_mismatch
      description: "System Design Index doesn't match systems/_index.md"
      detection: index_sync
      auto_fix: true
      fix_action: "Sync index to match systems/_index.md"

    - id: stale_adr_reference
      description: "References deprecated or superseded ADR"
      detection: adr_status_check
      auto_fix: true
      fix_action: "Update reference to current ADR status"

judgment_checks:

  governance:
    - id: contradictory_sections
      description: "Two sections describe mutually exclusive mechanics"
      question: "Do any two sections contradict each other? If yes, which interpretation should the design commit to?"

    - id: vague_invariant
      description: "Invariant rule too broad to be testable"
      section: "### Design Invariants"
      question: "Is this invariant testable with a binary yes/no, or is it too vague?"

    - id: anchor_conflict
      description: "Two Decision Anchors contradict in a realistic scenario"
      section: "### Decision Anchors"
      question: "Do any two anchors contradict when applied to the same decision?"

    - id: pressure_test_failure
      description: "Current feature would fail a defined Pressure Test"
      section: "### Design Pressure Tests"
      question: "Would any current system or feature fail this pressure test?"

  simulation_requirements:
    - id: vague_state
      description: "State That Matters entry lacks consequences"
      section: "### State That Matters"
      question: "Does every state entry describe what changes, what the player sees, AND what consequences emerge? Flag entries that name state without explaining why it matters."

    - id: behavior_is_ui
      description: "Behaviors That Need Rules entry is really UI"
      section: "### Behaviors That Need Rules"
      question: "Is every entry a genuine gameplay behavior that needs rule-driven simulation, or are some really UI displays, information panels, or presentation concerns?"

    - id: action_without_governance
      description: "Player action lacks governance explanation"
      section: "### Player Actions That Need Governance"
      question: "Does every entry explain what evaluation, scheduling, or constraint the game must apply? Flag actions listed without explaining what makes them non-trivial."

    - id: interaction_missing_endpoint
      description: "Interaction pattern has no clear consequence"
      section: "### Interaction Patterns"
      question: "Does every causal chain end in a player-visible consequence? Flag chains that trail off or loop without observable outcome."

    - id: depth_boundary_contradiction
      description: "Simulation Depth Target contradicts Simulation Boundaries"
      section: "### Simulation Depth Target"
      question: "Does anything in Simulation Depth Target claim to simulate something that Simulation Boundaries says should NOT be simulated, or vice versa?"

    - id: naming_systems
      description: "Simulation Requirements section names systems instead of requirements"
      section: "## Simulation Requirements"
      question: "Does this section name specific systems (e.g., 'Task System', 'Power System') instead of describing behaviors, state, and interactions that REQUIRE systems to exist? The design doc defines demand, not architecture."

  layer_violations:
    - id: layer_violation
      description: "Design doc contains system-layer truth"
      question: "Does the design doc contain ownership tables, signal registries, interface contracts, or data schemas that belong in later-step docs?"

  scope:
    - id: scope_creep
      description: "Design doc describes features beyond roadmap scope"
      section: "## Scope"
      question: "Does the design doc promise features not covered by any roadmap phase?"

    - id: philosophy_drift
      description: "Philosophy section wording no longer matches project direction"
      section: "## Philosophy"
      question: "Does the Philosophy section still match how the project is actually evolving?"

signals:

  downstream_drift:
    - id: invariant_violation
      description: "Downstream doc implies mechanic breaking a Design Invariant"
      detection: "Compare system/spec/slice behavior against invariants"

    - id: unescalated_mechanic
      description: "Downstream doc introduces player-facing mechanic not in design doc"
      detection: "Check for new mechanics in systems/specs not traceable to design doc"

report:
  log_name_pattern: "FIX-design-{date}.md"

rules:
  - "Only edit the design doc"
  - "Never change what the game is — only fix how clearly the doc expresses it"
  - "Derive fixes from context, never invent"
  - "Governance format fixes must preserve meaning exactly"
  - "Design intent is sacred"
  - "Layer violations are always human-required"
