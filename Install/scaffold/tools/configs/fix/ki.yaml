# ki.yaml — Fix config for Known Issues

layer: ki
display_name: "Known Issue"
target_pattern: "decisions/known-issues/KI-*.md"
target_type: range
template: "scaffold/templates/known-issue-entry-template.md"

preflight:
  required_files: []
  glob_pattern: "decisions/known-issues/KI-*.md"
  blocked_message: "No KI files found."

context_files:
  static:
    - design/glossary.md
    - scaffold/doc-authority.md

editable_files_pattern: "decisions/known-issues/KI-*.md"

defaults:
  max_iterations: 3

mechanical_checks:
  completeness:
    - id: missing_sections
      description: "Section required by template is absent"
      detection: template_diff
      auto_fix: true
      fix_action: "Add section heading with template comment"

    - id: template_text
      description: "TODO or template placeholder"
      detection: pattern_match
      patterns: ["<!-- TODO:", "*TODO:"]
      auto_fix: true
      fix_action: "Remove template text"

  terminology:
    - id: glossary_compliance
      description: "NOT-column term used"
      detection: glossary_not_column
      auto_fix: true
      fix_action: "Replace with canonical term"

judgment_checks:
  quality:
    - id: vague_description
      description: "Description doesn't cite specific docs, sections, or behavior"
      section: "## Description"
      question: "Is the issue specific enough to act on without guessing?"

    - id: trivial_fix
      description: "Fix Options has one obviously correct option"
      section: "## Fix Options"
      question: "Should this KI just be resolved instead of tracked?"

report:
  log_name_pattern: "FIX-ki-{target}-{date}.md"

rules:
  - "Don't resolve the issue — improve how it's documented"
  - "Vague descriptions are the most common problem"
