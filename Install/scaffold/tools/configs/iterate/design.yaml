# design.yaml — Iterate config for design-doc.md (Step 1)
# Three-pass review: L3 (subsections) → L2 (sections) → L1 (document)

layer: design
display_name: "Design Document"
target: design/design-doc.md
target_type: fixed

preflight:
  required_files:
    - design/design-doc.md
  min_content_pct: 50
  check_governance: true
  blocked_message: "No design doc to review. Run `/scaffold-init-design` first."
  incomplete_message: "Design doc is too incomplete for adversarial review. Run `/scaffold-init-design --mode fill-gaps` to fill remaining sections, then `/scaffold-fix-design` to clean up mechanical issues."

context:
  budget: 40000

  base: []

  per_target: []

  per_section:
    "### Design Invariants":
      - file: design/systems/_index.md
        class: evidence
        priority: 3
    "### Player Verbs":
      - file: design/systems/_index.md
        class: evidence
        priority: 3
    "### State That Matters":
      - file: design/systems/_index.md
        class: evidence
        priority: 2
    "### Entity Presentation":
      - file: design/systems/_index.md
        class: evidence
        priority: 3
    "### Scope Reality Check":
      - file: design/systems/_index.md
        class: evidence
        priority: 3

  on_demand:
    - file: design/glossary.md
      class: constraint
      sections: ["## Terms"]
      priority: 4
    - file: scaffold/doc-authority.md
      class: constraint
      priority: 5

defaults:
  max_iterations: 10
  max_exchanges: 5
  sleep_between_topics: 10

# ---------------------------------------------------------------------------
# L3 — Subsection Review (### level)
# ---------------------------------------------------------------------------

l3_sections:

  # -- Identity --

  "### Core Fantasy":
    parent: "## Identity"
    questions:
      - "Is the fantasy specific enough that two developers would build the same game from it?"
      - "Does it name a concrete player role, not just a genre?"
      - "Could you explain this fantasy to a non-gamer in one sentence?"

  "### Design Invariants":
    parent: "## Identity"
    questions:
      - "Can each invariant be tested with a binary yes/no?"
      - "Do invariants protect the Core Pillars? Is there at least one invariant guarding each pillar?"
      - "Do any two invariants contradict each other in a realistic scenario?"
      - "Are there 3-7 invariants? Too few = underspecified, too many = decision paralysis."

  "### Elevator Pitch":
    parent: "## Identity"
    questions:
      - "Does the pitch accurately summarize the game described in the rest of the document?"
      - "Has the pitch drifted from what the sections actually describe?"

  "### Core Pillars":
    parent: "## Identity"
    questions:
      - "Does each pillar appear in at least one concrete section (a loop, a mechanic, a simulation requirement)?"
      - "Are pillars distinct from each other, or do they overlap?"
      - "Are there pillars that exist only as aspirations with no mechanical expression?"

  "### Core Design Tension":
    parent: "## Identity"
    questions:
      - "Does the tension actually produce hard choices, or does one side always win?"
      - "Do the loops, decisions, and failure philosophy force the player to navigate this tension?"
      - "Can the player realistically choose either side?"

  "### Unique Selling Points":
    parent: "## Identity"
    questions:
      - "Are USPs traceable to specific mechanics or invariants?"
      - "Do USPs describe actual differentiators, not genre conventions ('base building', 'survival mechanics')?"

  # -- Shape --

  "### Core Loop":
    parent: "## Shape"
    questions:
      - "Is it a full cycle (input → action → feedback → new state → new decision)?"
      - "Does it match the Player Control Model?"
      - "If control is indirect but the loop describes direct actions, which is wrong?"
      - "What is the player physically doing for an uninterrupted 5 minutes? What inputs are repeated most?"
      - "Do the Player Verbs actually appear in the loop steps? List every verb and check — verbs that aren't in any loop are aspirational."

  "### Secondary Loops":
    parent: "## Shape"
    questions:
      - "Do secondary loops wrap around the Core Loop, or are they parallel tracks?"
      - "Do they recontextualize core loop decisions, or just add content surface area?"
      - "Which loop is repeated most often? What prevents it from becoming mechanical after 20 repetitions?"

  "### Session Shape":
    parent: "## Shape"
    questions:
      - "Is the session length realistic for the decision density described?"
      - "Does the session have a natural arc (opening, middle, wind-down)?"

  "### Progression Arc":
    parent: "## Shape"
    questions:
      - "Does it describe genuine capability growth, or just number inflation?"
      - "'Unlock new building types' is growth. 'Buildings get +10% efficiency' is inflation."

  "### Player Goals":
    parent: "## Shape"
    questions:
      - "Do short-term, mid-term, and long-term goals build on each other?"
      - "Are there disconnected goals that produce grind?"

  "### Decision Types":
    parent: "## Shape"
    questions:
      - "Do decision types match the loops? If loops produce tactical decisions but this claims strategic depth, where do strategic decisions emerge?"
      - "Which decisions feel high effort but low impact? Where can the player get outsized value for minimal engagement?"

  "### Decision Density":
    parent: "## Shape"
    questions:
      - "Does the cadence match the session shape?"
      - "A 30-minute session with only 2 meaningful decisions is a watching game."
      - "Is the Core Loop fast enough to support the claimed density? Count the loop steps and estimate real-time duration per cycle."

  # -- Control --

  "### Player Control Model":
    parent: "## Control"
    questions:
      - "Is the control model specific and consistent with Core Fantasy?"
      - "Is it consistent with the Player Verbs and Player Actions That Need Governance sections?"

  "### Control Philosophy":
    parent: "## Control"
    questions:
      - "Does the philosophy explain WHY the control model is this way?"
      - "Is it consistent with the Core Design Tension?"

  "### Player Verbs":
    parent: "## Control"
    questions:
      - "Are verbs concrete actions, not abstractions?"
      - "Does every verb appear in Player Actions That Need Governance or is it trivial enough to not need governance?"
      - "Walk through every verb — is the underlying state change and governance requirement described in Simulation Requirements? Flag any verb where the design doc doesn't explain what makes the action non-trivial."

  "### Player Mental Model":
    parent: "## Control"
    questions:
      - "Does it align with what the loops, simulation requirements, and interaction patterns actually produce?"
      - "If the mental model says 'manage a living colony' but loops describe clicking timers, the player will feel deceived."

  "### Feedback Loops":
    parent: "## Control"
    questions:
      - "Does every player action have a described feedback path?"
      - "Are positive and negative feedback loops balanced?"
      - "Do feedback loops promise real-time visibility into state that the Simulation Transparency Policy or Player Information Model says is hidden or delayed? If so, which is wrong?"

  # -- World --

  "### Place & Time":
    parent: "## World"
    questions:
      - "Is the setting specific enough to guide art and audio direction?"
      - "Does it support the Core Fantasy?"
      - "Does the setting constrain or enable the mechanics? Could this game work equally well in a different setting? If yes, the setting is decoration — either commit to it mechanically or acknowledge it's flavor."

  "### Tone":
    parent: "## World"
    questions:
      - "Does the tone match the Core Fantasy? Grim tone + whimsical fantasy = dissonance."
      - "Is it consistent across the document?"
      - "Does the tone match what the gameplay actually produces? A 'tense survival' tone with a forgiving simulation creates dissonance the player feels but can't name."

  "### Narrative Wrapper":
    parent: "## World"
    questions:
      - "Does it carry gameplay weight, or is it only flavor?"
      - "If factions exist in the narrative but have no mechanical expression, they're decoration."
      - "What happens to the narrative over a full playthrough? Does it evolve, escalate, or just repeat the same frame?"

  "### Factions / Forces":
    parent: "## World"
    questions:
      - "Do factions have mechanical impact described elsewhere (loops, simulation requirements, decisions)?"
      - "Factions without mechanics are worldbuilding without gameplay."
      - "Do factions create asymmetric gameplay (different strategies, different threats) or are they just flavor labels with identical behavior?"

  # -- Presentation --

  "### Camera":
    parent: "## Presentation"
    questions:
      - "Does the camera perspective match the Player Control Model?"
      - "Top-down suits oversight. Close third-person suits direct control."

  "### Aesthetic Pillars":
    parent: "## Presentation"
    questions:
      - "Do aesthetic pillars reinforce the Tone?"
      - "Visual identity should amplify the emotional register, not contradict it."

  "### Audio Direction":
    parent: "## Presentation"
    questions:
      - "Does audio direction support the Place & Time?"
      - "Audio that doesn't match the setting breaks immersion."

  "### Entity Presentation":
    parent: "## Presentation"
    questions:
      - "Are all major content categories represented with visual identity, animations, and sound identity?"
      - "Do animation sets cover the player verbs and state transitions for each entity type?"
      - "Does the sound identity support the game's audio direction?"
      - "Is this specific enough for downstream docs (system designs, specs) to inherit asset needs?"
      - "Are there content categories listed in Content Categories that have no presentation entry?"

  "### Player Information Model":
    parent: "## Presentation"
    questions:
      - "Does the information model match the Simulation Transparency Policy?"
      - "Does it enable the Decision Types described? If decisions require planning but info is hidden, the player can't plan."
      - "If 5 problems exist simultaneously, how does the player identify the top priority? What happens if they pick wrong?"
      - "What must the player track simultaneously at peak complexity? What can safely be ignored without punishment?"
      - "Imagine the busiest possible screen state — every active simulation element competing for attention. What gets lost? What overlaps? What information hierarchy prevents overload?"

  # -- Content --

  "### Content Structure":
    parent: "## Content"
    questions:
      - "Does it support the Replayability Model?"
      - "Is content organized by how the player encounters it (progression), or by how the developer organizes it (taxonomy)? The former drives design, the latter is just filing."

  "### Content Categories":
    parent: "## Content"
    questions:
      - "Are categories complete for the game described?"
      - "For each loop and player verb, what content does it consume or produce? Are there implied categories not listed here?"
      - "Which content category has the highest volume? Is that volume achievable given scope?"

  "### Procedural vs Authored":
    parent: "## Content"
    questions:
      - "Is the boundary explicit? Fuzzy boundaries create scope creep."
      - "What happens when procedural output produces something that contradicts the tone, narrative, or balance? Is there a described filter or rejection mechanism?"
      - "What is the minimum authored content needed for the procedural system to produce coherent output?"

  "### Replayability Model":
    parent: "## Content"
    questions:
      - "Is the replay model supported by the content structure, or is it aspirational?"
      - "What changes between run 1 and run 5? If nothing mechanical changes, replay relies entirely on player-generated goals."
      - "Does replay come from variety (different content), mastery (better execution), or emergence (different systemic outcomes)? Is the source explicit?"

  # -- Simulation Requirements --

  "### State That Matters":
    parent: "## Simulation Requirements"
    questions:
      - "List ALL simulation state implied by the design. For each: what player behavior depends on it, what breaks without it, whether it is currently defined, underdefined, or missing."
      - "What state typically exists in this genre that is absent here? For each: is it intentionally excluded (cite Design Boundaries or Simulation Boundaries) or accidentally missing?"
      - "Does every entry describe three things: what changes, what the player sees, and what consequences emerge? Flag entries that name state without explaining why it matters to the player."
      - "Which 3-5 pieces of state are absolutely load-bearing — they define the core experience minute-to-minute? Which state supports those? Which is optional flavor-layer?"
      - "At what point in the game does each piece of state become relevant? What state is irrelevant early but critical late?"

  "### Behaviors That Need Rules":
    parent: "## Simulation Requirements"
    questions:
      - "Is every entry a genuine gameplay behavior that needs persistent, rule-driven simulation? Or are some really UI concerns, one-time events, or data lookups disguised as behaviors?"
      - "Are any behaviors described so broadly that they conflate 3+ unrelated dynamics? What would a clean decomposition look like?"
      - "Over-design test: which behaviors do not meaningfully affect player decisions? Which could be removed with minimal gameplay impact? Which are solving a problem that doesn't exist?"

  "### Player Actions That Need Governance":
    parent: "## Simulation Requirements"
    questions:
      - "Does every entry explain what makes the action non-trivial — what evaluation, scheduling, conflict resolution, or constraint the game must apply?"
      - "Are there player actions described in Player Verbs or the Core Loop that are missing from this section?"
      - "Are any entries trivial actions that don't actually need governance (e.g., opening a menu, scrolling a list)?"

  "### Interaction Patterns":
    parent: "## Simulation Requirements"
    questions:
      - "Are interaction patterns specific enough to derive system boundaries from? Could two developers read this and agree on where one simulation concern ends and another begins?"
      - "For each described interaction: what triggers it, which direction does causality flow, and does the chain end in a player-visible consequence? Flag patterns that trail off or loop without observable outcome."
      - "Are there interactions that span multiple distinct state domains without clarifying how they connect? What are the handoff points?"
      - "Which interaction pattern is the 'meta driver' — the one most other patterns depend on or respond to? Is that centrality explicit or accidental?"

  "### Simulation Depth Target":
    parent: "## Simulation Requirements"
    questions:
      - "Does the depth target match the scope commitment?"
      - "Does the doc acknowledge the depth-vs-breadth tradeoff?"

  "### Simulation Boundaries":
    parent: "## Simulation Requirements"
    questions:
      - "Are boundaries concrete — do they name specific things the simulation will NOT model?"
      - "Do boundaries prevent scope creep into unnecessary simulation detail?"
      - "Are there implicit simulation assumptions that should be explicit boundaries?"

  # -- Philosophy --

  "### Failure Philosophy":
    parent: "## Philosophy"
    questions:
      - "Does it describe what failure feels like, not just what triggers it?"
      - "Is failure interesting (player agency during failure) or just punitive?"
      - "What does the player DO after failure? How long does recovery take? When does recovery feel pointless vs engaging?"
      - "When something goes wrong, which simulation domain handles it? Could two distinct areas of the simulation both try to resolve the same failure — and is that overlap described in Interaction Patterns?"
      - "Trace every failure scenario in Failure Philosophy and Pressure Tests through the simulation requirements — what state changes, what behaviors fire, what consequences cascade? Are any steps in the chain not covered by Simulation Requirements?"

  "### Risk / Reward Philosophy":
    parent: "## Philosophy"
    questions:
      - "Is the risk/reward balance consistent with the Core Design Tension?"

  "### Simulation Transparency Policy":
    parent: "## Philosophy"
    questions:
      - "Does it match the Player Information Model?"
      - "If transparency promises 'players understand consequences' but the model hides state, they contradict."

  "### Information Clarity Principle":
    parent: "## Philosophy"
    questions:
      - "Does it enable the Decision Types described?"

  "### Decision Anchors":
    parent: "## Philosophy"
    questions:
      - "Does each anchor resolve a real ambiguity? Can you construct a plausible question where the anchor determines the answer?"
      - "Do any two anchors contradict in a realistic scenario?"
      - "Are there 3-5 anchors?"

  "### Design Pressure Tests":
    parent: "## Philosophy"
    questions:
      - "Is each scenario plausible? Tests against impossible conditions don't validate the design."
      - "Do they stress the Core Design Tension?"
      - "Are there 3-6 tests?"

  "### Design Gravity":
    parent: "## Philosophy"
    questions:
      - "Does gravity describe evolution directions distinct from Core Pillars?"
      - "Are the directions achievable given the simulation requirements described?"
      - "Are there 3-4 gravity directions?"

  "### Design Boundaries":
    parent: "## Philosophy"
    questions:
      - "Do boundaries name specific things the game is NOT?"
      - "'Not a first-person shooter' is obvious. 'Not a game where the player directly commands colonists' is useful."

  "### Learning Curve Strategy":
    parent: "## Philosophy"
    questions:
      - "Does it match the actual complexity in the loops, decisions, and simulation requirements?"
      - "What mechanics are introduced in what order? Is there a dependency chain — does mechanic B require understanding mechanic A?"
      - "What happens if the player skips or misunderstands early teaching? Can they recover, or do they hit a wall hours later?"
      - "At what complexity point do most players in this genre quit? Does the design acknowledge this threshold and plan for it?"

  # -- Scope --

  "### Scope Reality Check":
    parent: "## Scope"
    questions:
      - "Does it accurately reflect the document's ambition?"
      - "Is the MVP described, and does it include the Core Loop?"

  "### Target Platforms":
    parent: "## Scope"
    questions:
      - "Do platforms impose constraints the design doesn't acknowledge?"

  "### Accessibility Goals":
    parent: "## Scope"
    questions:
      - "Do accessibility goals conflict with core mechanics?"

  "### Performance Targets":
    parent: "## Scope"
    questions:
      - "Are targets realistic given the simulation depth described?"

  "### Technical Stack":
    parent: "## Scope"
    questions:
      - "Does the Technical Stack match what's actually in the project?"
      - "Are engine, languages, test frameworks, and build system all specified?"
      - "Are key dependencies listed — no hidden assumptions about what's installed?"

# ---------------------------------------------------------------------------
# L2 — Section Review (## level)
# ---------------------------------------------------------------------------

l2_sections:

  "## Identity":
    questions:
      - "Do Core Fantasy, Invariants, Pillars, Tension, and USPs all describe the same game?"
      - "Could someone reconstruct the game concept from this section alone?"
      - "Is there a shadow identity — does this section describe one game while Shape describes another?"

  "## Shape":
    questions:
      - "Do the loops produce the experience Identity describes?"
      - "Is decision density calibrated to session shape?"
      - "Does the progression arc build on the loops, not bypass them?"

  "## Control":
    questions:
      - "Does the control model match what Identity claims the player does?"
      - "Do Player Verbs, Mental Model, and Feedback Loops agree?"
      - "If the player optimizes purely for efficiency, does the resulting play still resemble the intended experience?"

  "## World":
    questions:
      - "Does the world make the player believe in the game, or fight against the mechanics?"
      - "Do tone, narrative, and factions reinforce each other?"

  "## Presentation":
    questions:
      - "Does camera, aesthetic, audio, and information model form a coherent presentation layer?"
      - "Does the information model enable the decisions Shape describes?"

  "## Content":
    questions:
      - "Is content scope honest? Does structure support replayability claims?"
      - "Is the procedural/authored boundary clear?"

  "## Simulation Requirements":
    questions:
      - "List all simulation state, behaviors, and player actions required for the game described in Identity and Shape to function. Categorize each as: explicitly defined, underdefined, or missing. Do not assume completeness."
      - "Does the simulation depth target match the scope commitment?"
      - "Walk through each loop, behavior, and player verb — is the underlying state and governance requirement described? Flag any step where the design doc doesn't explain what persistent state or rule-driven behavior is needed."
      - "For every piece of game state mentioned (health, mood, instability, skills, position, inventory) — is it listed in State That Matters with what changes, what the player sees, and what consequences emerge? Flag state mentioned elsewhere but missing from this section."
      - "For each entity type (colonist, structure, resource, etc.): is the full lifecycle described — how is it created, how does it change, how does it end? Flag entities whose lifecycle is only partially specified."
      - "If a player plays for 5 hours, what simulation requirements naturally become dominant? What becomes a bottleneck? What repeated behaviors are described elsewhere but missing from Simulation Requirements?"
      - "What simulation requirements emerge only after extended play that aren't obvious from the design doc's early-game descriptions?"
      - "For every interaction pattern: what triggers it, what direction does causality flow, and does the chain end in a player-visible consequence? Flag patterns that trail off or loop without observable outcome."
      - "Count the distinct simulation requirements (state domains, behaviors, governed actions). Is this achievable for the scope described? Simulation requirements are where scope creep hides — each one implies a system, specs, tasks, and testing."
      - "Does this section name specific systems (Task System, Power System, etc.) instead of describing requirements? The design doc defines WHAT the simulation must do, not WHICH systems do it."

  "## Philosophy":
    questions:
      - "Do governance mechanisms actually resolve ambiguous downstream decisions?"
      - "If a developer is tired and rushing, which mechanisms will still hold?"
      - "Do invariants, anchors, pressure tests, gravity, and boundaries form a coherent governance system?"
    skip_if: governance_empty

  "## Scope":
    questions:
      - "Does scope honestly reflect what Shape + Simulation Requirements promise?"
      - "Is the MVP real — does it include the Core Loop?"
      - "Are there features that appear small but are structurally central and likely to expand?"

# ---------------------------------------------------------------------------
# L1 — Document Review (# level)
# ---------------------------------------------------------------------------

l1_questions:
  - "If five different developers each read only one section group, would they all build the same game?"
  - "What player experience does this design accidentally create — based on loops, controls, and decisions, not the Core Fantasy claim?"
  - "Which governance mechanism is weakest — most likely to fail in practice?"
  - "What part of this design is most likely to be misbuilt even if the team follows the document in good faith?"
  - "Does the design describe a game where interruption, stale targets, and continuous world churn are normal — or does it implicitly assume clean execution paths?"
  - "This design is incomplete. Prove it: list every system you would be forced to invent during SYS-### generation because the design implies behavior but never assigns ownership. For each: name the behavior, name the system it needs, and state what breaks without it."
  - "What will the player confidently believe about a mechanic that is actually wrong? Where will misinterpretation cause them to quit?"
  - "Which section adds the least to the design? Could it be removed without changing what gets built? Sections that exist because the template had a slot — not because the game needs them — are bloat that dilutes the signal."

stress_test:
  mode: interrogation
  reviewer_instruction: "You are NOT checking documentation. You are trying to break the game design. Think as a player, a critic, and a rival designer simultaneously. Every issue must describe a concrete gameplay scenario, not a document structure concern."
  adjudication_rules:
    - "Issues are gameplay concerns, not document defects"
    - "Classify as: design_risk (file KI or add pressure test), already_mitigated (cite section), or escalate"
    - "Do NOT result in design doc edits unless user explicitly accepts"
    - "Do not reject for being 'not a document problem' — that's the point"
  questions:
    - "Control model stress: construct a scenario where the player desperately wants direct control but cannot have it. Does the design provide enough indirect tools?"
    - "Stable-state boredom: what does the player do for 10 uninterrupted minutes when nothing is going wrong?"
    - "Irreversibility tipping point: at what point does the player feel locked out instead of invested?"
    - "Cognitive load ceiling: at what point does transparency become overload?"
    - "Dominant strategy search: what's the most efficient strategy a min-maxer would find? Does it bypass the core tension?"
    - "Emotional failure mode: when does the game stop being tense and become exhausting? What recovery mechanism prevents this?"
    - "Fantasy-mechanics convergence: what does the player actually spend 80% of their time doing? Does that match the Core Fantasy?"
    - "New player cliff: when does 'unfamiliar tools' stop feeling fresh and start feeling like a missing feature?"
    - "Laziest viable strategy: what happens if the player ignores half the systems? What is the minimum engagement that avoids collapse?"
    - "Exploit surface: what mechanics can be spammed safely? What penalties can be avoided entirely? What systems can be ignored without consequence?"
    - "Accidental reward: what behavior does the system reward that the design didn't intend?"
    - "Collapse scenario: what happens if the player does nothing for 30 minutes? What happens if they min-max one system exclusively? Can they soft-lock themselves?"
    - "Long-term decay: what changes after 10 hours that wasn't true at hour 1? What prevents repetition? What systems evolve, unlock, or scale?"
    - "Speedrunner abuse: what would a player trying to break the game exploit first? What degenerate loop produces the most reward for the least risk?"

identity_check:
  questions:
    - "If all downstream docs were lost, what game would this design doc cause the team to rebuild?"
    - "What is the player actually spending most of their time doing, based on this document?"
    - "What part of the game is mechanically load-bearing vs aspirational flavor?"
    - "What design promise is most at risk of erosion during implementation?"
    - "What would a new team member most likely misunderstand after reading this doc once?"

design_choice_examination:
  questions:
    - "What major design choices define this game?"
    - "What problem or experience goal does each choice solve?"
    - "What tradeoff does each choice impose?"
    - "Is any major choice unsupported by mechanics or governance?"
    - "Which design choice most constrains the game's future evolution, and is that constraint intentional?"

scope_guard:
  upward: null
  downward: "system designs, architecture, engine docs"
  tests:
    - name: layer_test
      question: "Does this change introduce implementation detail that belongs in system designs, architecture, or engine docs?"
      guidance: "The design doc defines what the game is and how it feels, not how systems work internally."
    - name: abstraction_test
      question: "Is this change written at the right level of abstraction for a design doc?"
      examples:
        correct: "colonists become unhappy when hungry"
        wrong: "NeedsSystem decrements mood when hunger exceeds threshold"
    - name: constraint_test
      question: "Does this change lock implementation options that should remain open?"
      guidance: "If the change would force a specific system decomposition, data model, or architectural pattern, it's implementation leakage."

adjudication:
  editable_files:
    - design/design-doc.md
  outcomes: [accept_edit, reject, escalate, ambiguous_intent]
  rules:
    # Evaluation standards
    - "Every finding must be evaluated on merit — neither accept nor reject is the default"
    - "Accepting requires: the finding is accurate AND the suggested change improves the document"
    - "Rejecting requires: cite the specific rule, section, or invariant that makes the finding wrong or the change harmful"
    - "If you can't confidently do either — escalate to the user with the specific question and options"
    - "If a finding identifies a real gap (missing system, undefined ownership, unclear behavior) — that is a valid finding even if the fix is imperfect"
    - "Prefer fixing the design doc over escalating — but genuine ambiguity should reach the user, not get silently rejected"
    # Guardrails for actual design changes
    - "Never half-accept — choose exactly one outcome per issue"
    - "If reviewer and Claude disagree after max-exchanges, escalate to user"
    - "If multiple valid interpretations exist, flag ambiguous_intent for user decision"
    - "Governance weakening always requires user confirmation"
    - "Scope judgments are flagged, not imposed"
    - "Do not invent missing mechanics — flag the gap, add a TODO, or note the absence"
    - "Diagnose, don't prescribe — name the problem, suggest direction, don't write the solution"

review_lock:
  track_by: root_cause
  examples:
    - same: ["vision statement too vague", "core fantasy unclear"]
    - same: ["player motivation loop missing", "no engagement driver defined"]

report:
  log_name_pattern: "ITERATE-design-{date}.md"
  final_questions:
    - name: "Biggest Internal Contradiction"
      prompt: "Where does the document most fight against itself? If none, say so."
    - name: "Accidental Player Experience"
      prompt: "What will the player actually experience vs. what Core Fantasy claims?"
    - name: "Weakest Governance Mechanism"
      prompt: "Which invariant/anchor/test/gravity is most likely to fail in practice, and why?"
    - name: "Most Likely Misbuilt"
      prompt: "What part of this design is most likely to be misbuilt even if the team follows the document in good faith?"
    - name: "Missing Systems"
      prompt: "What systems would need to be invented during SYS-### generation because the design implies behavior but never assigns ownership? List specific behaviors and the systems they need."
    - name: "Player Reality Gap"
      prompt: "Where is the biggest gap between what the design claims the player experiences and what the mechanics actually produce minute-to-minute?"
  rating:
    scale: 5
    descriptions:
      1: "fundamentally incoherent (vision split, loops don't produce the fantasy, governance absent)"
      2: "major issues (significant internal contradictions, weak governance, scope disconnected from reality)"
      3: "workable but soft (some misalignment between sections, governance present but undertested)"
      4: "solid design (internally consistent, governance works, minor soft spots)"
      5: "strong design (sections reinforce the same vision, governance resolves real ambiguities, scope claims are honest)"

rules:
  - "Project documents and authority order win"
  - "The design doc describes WHAT the game is, not HOW to build it"
  - "Only edit the design doc"
  - "Edits that improve clarity, fill gaps, or tighten specificity are valid improvements — evaluate whether the specific change is accurate"
  - "Edits that change what the game IS (not how it's described) require escalation"
  - "Identifying missing systems, undefined ownership, or implicit behaviors is a valid finding — document the gap"
  - "Governance edits must preserve intent — adding specificity to vague governance is an improvement, not a change"
  - "Never weaken governance without user confirmation"
  - "Stay at the design layer — no implementation detail"
  - "Theory observations are advisory, not authority"
  - "Never blindly accept — but never reflexively reject either. Cite your reason."
  - "Pushback is expected and healthy"
  - "Reappearing material issues escalate to user after 2 iterations"
  - "Ambiguous design intent is not a defect — flag for user decision"
  - "Resolved issues are locked across iterations by root cause"
