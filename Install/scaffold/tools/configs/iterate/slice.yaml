# slice.yaml — Iterate config for vertical slice contracts (Step 8)
# Three-pass review: L3 (subsections) → L2 (sections) → L1 (document)

layer: slice
display_name: "Vertical Slice"
target_pattern: "slices/SLICE-*.md"
target_type: range

preflight:
  required_files:
    - design/design-doc.md
  glob_pattern: "slices/SLICE-*-*.md"
  blocked_message: "No slice docs found. Run `/scaffold-new-slice` first."

context:
  budget: 30000

  base: []

  per_target:
    - type: parent_phase
      sections: ["### Objective", "### Slice Strategy", "### Exit Criteria"]
      priority: 1
      class: upstream

  per_section:
    "### Goal":
      - file: design/design-doc.md
        class: canonical
        sections: ["### Core Loop"]
        priority: 2
    "### Integration Points":
      - file: design/interfaces.md
        class: constraint
        priority: 2
        condition: exists
    "### Done Criteria":
      - file: design/architecture.md
        class: constraint
        sections: ["## Foundation Areas"]
        priority: 3
        condition: exists

  on_demand:
    - file: design/glossary.md
      class: constraint
      sections: ["## Terms"]
      priority: 4
      description: "Earlier slices (for dependency validation)"

defaults:
  max_iterations: 10
  max_exchanges: 5
  sleep_between_topics: 10

# ---------------------------------------------------------------------------
# L3 — Subsection Review (### level)
# ---------------------------------------------------------------------------

l3_sections:

  "### Goal":
    parent: "## Purpose"
    questions:
      - "Is this one sentence that describes an end-to-end experience?"
      - "Is it concrete enough to demo?"

  "### Proof Value":
    parent: "## Purpose"
    questions:
      - "Does it name a specific uncertainty this slice reduces?"
      - "A slice with no clear proof value is progress theater."

  "### Assumptions":
    parent: "## Purpose"
    questions:
      - "Are assumptions explicit — what must exist before this slice can work?"
      - "Are there hidden assumptions that would make dependency mistakes invisible?"

  "### Specs Included":
    parent: "## Work"
    questions:
      - "Is the spec list complete for the proof goal?"
      - "Are there specs that don't contribute to the proof?"

  "### Tasks":
    parent: "## Work"
    questions:
      - "Is the task ordering correct for implementation?"
      - "Are there dependency gaps between tasks?"

  "### Integration Points":
    parent: "## Work"
    questions:
      - "Are all cross-system connections identified?"
      - "Do they reference interfaces.md?"

  "### Starting Conditions":
    parent: "## Proof"
    questions:
      - "Are starting conditions specific enough to make the demo reproducible?"

  "### Done Criteria":
    parent: "## Proof"
    questions:
      - "Are criteria testable — can you verify each one?"
      - "Do they match the proof goal?"

  "### Failure Modes This Slice Should Catch":
    parent: "## Proof"
    questions:
      - "Are failure modes specific — what breakage would be visible?"
      - "Is the slice defined by bugs it would expose, not just the happy path?"

  "### Visible Proof":
    parent: "## Proof"
    questions:
      - "Is proof player-visible, not just logs or internal inspection?"

  "### Demo Script":
    parent: "## Proof"
    questions:
      - "Is the demo step-by-step and reproducible?"
      - "Does it start from the Starting Conditions?"

# ---------------------------------------------------------------------------
# L2 — Section Review (## level)
# ---------------------------------------------------------------------------

l2_sections:

  "## Purpose":
    questions:
      - "Do Goal, Proof Value, and Assumptions together define why this slice exists?"
      - "Does the proof value justify the implementation cost?"
      - "Are assumptions consistent with what earlier slices deliver?"

  "## Work":
    questions:
      - "Do Specs, Tasks, and Integration Points form a complete implementation plan?"
      - "Are all integration points covered by at least one spec?"
      - "Is the task ordering feasible?"

  "## Proof":
    questions:
      - "Do Starting Conditions, Done Criteria, Failure Modes, Visible Proof, and Demo Script form a convincing proof chain?"
      - "Could someone who didn't write this slice run the demo and verify the proof?"
      - "Does the proof actually validate the Proof Value, or just prove the happy path?"

# ---------------------------------------------------------------------------
# L1 — Document Review (# level)
# ---------------------------------------------------------------------------

l1_questions:
  - "Does this slice actually prove what it claims to prove?"
  - "Are the boundaries clean — is it clear what's in and out?"
  - "Does it exercise real integration points, not just isolated systems?"
  - "Is it in the right position in the implementation sequence?"
  - "Can it be demonstrated to prove its value?"

scope_guard:
  upward: "phase scope, system designs"
  downward: "specs, tasks"
  tests:
    - name: upward_leakage
      question: "Does this change modify phase scope or system design decisions?"
      guidance: "Slices define vertical cuts through existing scope — they don't change the scope."
    - name: downward_leakage
      question: "Does this change introduce spec or task-level detail?"
      guidance: "Slices define what to prove; specs define how behavior works."

adjudication:
  editable_files_pattern: "slices/SLICE-*.md"
  outcomes: [accept, reject, escalate, ambiguous_intent]

review_lock:
  track_by: root_cause

report:
  log_name_pattern: "ITERATE-slice-{target}-{date}.md"
  final_questions:
    - name: "Most Dangerous Thing"
      prompt: "The issue most likely to make this slice fail to prove what it claims."
    - name: "Undetected Failure Risk"
      prompt: "What real architectural or integration failures could this slice miss?"
  rating:
    scale: 5
    descriptions:
      1: "fundamentally broken (proof goal unclear, boundaries broken)"
      2: "major issues (significant gaps in proof or integration)"
      3: "workable but soft (some gaps, minor boundary issues)"
      4: "solid slice (clear proof, good integration, minor soft spots)"
      5: "strong slice (unambiguous proof, comprehensive integration, well-sequenced)"

rules:
  - "Project documents and authority order win"
  - "Only edit the slice file being reviewed"
  - "Never blindly accept"
  - "Pushback is expected and healthy"
  - "Resolved issues are locked across iterations by root cause"
