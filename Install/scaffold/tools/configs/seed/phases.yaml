# phases.yaml — Seed config for phase scope gates

layer: phases
display_name: "Phase Scope Gates"
template: "scaffold/templates/phase-template.md"
index_file: "phases/_index.md"
id_pattern: "PHASE-###"
id_prefix: "PHASE"
output_pattern: "phases/PHASE-*-*.md"

preflight:
  required_files:
    - phases/roadmap.md
    - design/design-doc.md
  blocked_message: "Roadmap and design doc must exist before seeding phases."

upstream_sources:
  - type: roadmap
    glob: "phases/roadmap.md"
    extract: "Roadmap phase overview drives phase creation"
    extract_sections:
      - "### Phase Overview"
      - "### Capability Ladder"
      - "### System Coverage Map"
  - type: design
    glob: "design/design-doc.md"
    extract: "Design doc scope and simulation requirements inform phase goals"
    extract_sections:
      - "## Identity"
      - "## Simulation Requirements"
      - "## Content"
  - type: system
    glob: "design/systems/SYS-*-*.md"
    extract: "Systems inform which phase they belong to"
    extract_sections:
      - "### Purpose"
      - "### Owned State"

dependency_checks: []

coverage_rules:
  - "Every roadmap phase has a phase scope gate document"
  - "Every design doc simulation requirement maps to at least one phase"
  - "Phase entry/exit criteria form a valid chain"
