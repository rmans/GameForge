# style.yaml — Seed config for Step 5 visual/UX docs

layer: style
display_name: "Style & UX"
template: null
index_file: null
output_files:
  - design/style-guide.md
  - design/color-system.md
  - design/ui-kit.md
  - design/interaction-model.md
  - design/feedback-system.md
  - design/audio-direction.md

preflight:
  required_files:
    - design/design-doc.md
  blocked_message: "Design doc must exist before seeding style docs."

upstream_sources:
  - type: design
    glob: "design/design-doc.md"
    extract: "Tone, aesthetic pillars, camera, Entity Presentation, player information model drive style"
    extract_sections:
      - "## Identity"
      - "## Control"
      - "## Content"
  - type: system
    glob: "design/systems/SYS-*-*.md"
    extract: "System visibility and feel requirements inform UI and feedback"
    extract_sections:
      - "### Purpose"
      - "### Player Actions"
      - "### Asset Needs"
  - type: architecture
    glob: "design/architecture.md"
    extract: "Architecture constraints inform UI implementation approach"
    extract_sections:
      - "## Foundation Areas"
      - "## Core API Boundary"

dependency_checks: []

coverage_rules:
  - "Style guide covers all aesthetic dimensions from design doc"
  - "Color system has tokens for all game states"
  - "UI kit has components for all system visibility needs"
  - "Interaction model covers all Player Actions across systems"
  - "Feedback system covers all game events"
  - "Audio direction matches style guide tone"
