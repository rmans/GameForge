# design.yaml — Validate config for design-doc.md

scope: design
display_name: "Design Document"

activation:
  required_files:
    - design/design-doc.md
  skip_message: "No design doc found."

checks:
  deterministic:
    - id: design-exists
      description: "Design doc exists"
      detection: file_exists
      target_files: ["design/design-doc.md"]
      severity: FAIL

    - id: design-structure
      description: "Required sections present"
      detection: section_structure
      target_files: ["design/design-doc.md"]
      required_sections: [Identity, Shape, Control, World, Presentation, Content, "Simulation Requirements", Philosophy, Scope, "System Design Index"]
      severity: FAIL

    - id: design-section-health
      description: "Weighted section health score"
      detection: section_health
      target_files: ["design/design-doc.md"]
      fail_threshold: 0.5
      warn_threshold: 0.75
      severity: WARN

    - id: design-governance-invariants
      description: "Design Invariants has actual invariant entries"
      detection: pattern_present
      target_files: ["design/design-doc.md"]
      pattern: "Invariant:\\s+\\w+"
      severity: WARN

    - id: design-governance-anchors
      description: "Decision Anchors has actual anchor entries"
      detection: pattern_present
      target_files: ["design/design-doc.md"]
      pattern: "\\w+.*\\s+over\\s+.*\\w+"
      severity: WARN

    - id: design-governance-pressure-tests
      description: "Design Pressure Tests has actual test entries"
      detection: pattern_present
      target_files: ["design/design-doc.md"]
      pattern: "Pressure Test:\\s+\\w+"
      severity: WARN

    - id: design-failure-philosophy
      description: "Failure Philosophy has substantive content"
      detection: section_min_length
      target_files: ["design/design-doc.md"]
      section: "### Failure Philosophy"
      min_length: 150
      severity: WARN

    - id: design-system-index-sync
      description: "System Design Index matches systems/_index.md"
      detection: index_registration
      index_file: "design/design-doc.md"
      glob_pattern: "design/systems/SYS-*-*.md"
      id_pattern: "SYS-\\d+"
      severity: FAIL

    - id: design-review-freshness
      description: "Review log post-dates file modification"
      detection: review_freshness
      target_files: ["design/design-doc.md"]
      review_pattern: "ITERATE-design-*"
      severity: WARN

    - id: design-verb-table
      description: "Player Verbs has structured table with entries"
      detection: table_present
      target_files: ["design/design-doc.md"]
      section: "### Player Verbs"
      min_rows: 3
      severity: WARN

    - id: design-state-table
      description: "State That Matters has structured table with entries"
      detection: table_present
      target_files: ["design/design-doc.md"]
      section: "### State That Matters"
      min_rows: 3
      severity: WARN

    - id: design-entity-table
      description: "Entity Presentation has structured table with entries"
      detection: table_present
      target_files: ["design/design-doc.md"]
      section: "### Entity Presentation"
      min_rows: 2
      severity: WARN

    - id: design-control-tiers
      description: "Player Control Model defines direct/indirect/no-control tiers"
      detection: pattern_present
      target_files: ["design/design-doc.md"]
      pattern: "([Dd]irect|[Ii]ndirect|[Nn]o control).*([Dd]irect|[Ii]ndirect|[Nn]o control)"
      severity: WARN

    - id: design-info-hierarchy
      description: "Player Information Model defines information tiers"
      detection: section_min_length
      target_files: ["design/design-doc.md"]
      section: "### Player Information Model"
      min_length: 200
      severity: WARN

    - id: design-behaviors-content
      description: "Behaviors That Need Rules has substantive content"
      detection: section_min_length
      target_files: ["design/design-doc.md"]
      section: "### Behaviors That Need Rules"
      min_length: 100
      severity: WARN

    - id: design-governed-actions-content
      description: "Player Actions That Need Governance has substantive content"
      detection: section_min_length
      target_files: ["design/design-doc.md"]
      section: "### Player Actions That Need Governance"
      min_length: 100
      severity: WARN

    - id: design-interaction-patterns-content
      description: "Interaction Patterns has substantive content"
      detection: section_min_length
      target_files: ["design/design-doc.md"]
      section: "### Interaction Patterns"
      min_length: 100
      severity: WARN

    - id: design-sim-depth-content
      description: "Simulation Depth Target has substantive content"
      detection: section_min_length
      target_files: ["design/design-doc.md"]
      section: "### Simulation Depth Target"
      min_length: 50
      severity: WARN

    - id: design-sim-boundaries-content
      description: "Simulation Boundaries has substantive content"
      detection: section_min_length
      target_files: ["design/design-doc.md"]
      section: "### Simulation Boundaries"
      min_length: 50
      severity: WARN

    - id: design-failure-contract
      description: "Failure Philosophy contains enforceable contract"
      detection: pattern_present
      target_files: ["design/design-doc.md"]
      pattern: "(MUST have|must have|Every failure).*(MUST NOT|must not|No failure)"
      severity: WARN

    - id: design-risk-contract
      description: "Risk/Reward Philosophy contains enforceable contract"
      detection: pattern_present
      target_files: ["design/design-doc.md"]
      pattern: "(MUST generate|MUST NEVER|must never.*risk|always.*risk)"
      severity: WARN

  heuristic:
    - id: design-glossary-compliance
      description: "NOT-column terms not used"
      detection: glossary_not_column
      target_files: ["design/design-doc.md"]
      severity: WARN
      label: "[ADVISORY]"
