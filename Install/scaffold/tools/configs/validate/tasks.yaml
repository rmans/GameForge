# tasks.yaml — Validate config for implementation tasks

scope: tasks
display_name: "Tasks"
glob_pattern: "tasks/TASK-*-*.md"

activation:
  required_files:
    - tasks/_index.md
  skip_message: "No tasks index found."

checks:
  deterministic:
    - id: tasks-index-files
      description: "Task files registered in _index.md"
      detection: index_registration
      index_file: "tasks/_index.md"
      glob_pattern: "tasks/TASK-*-*.md"
      id_pattern: "TASK-\\d+"
      severity: FAIL

    - id: tasks-status-filename-sync
      description: "Filename suffix matches internal Status"
      detection: status_filename_sync
      glob_pattern: "tasks/TASK-*-*.md"
      severity: FAIL

    - id: tasks-structure
      description: "Required sections present"
      detection: section_structure
      glob_pattern: "tasks/TASK-*-*.md"
      required_sections: [Objective, Deliverable, Steps, "Regression Tests", "Verification Mapping"]
      severity: FAIL

    - id: tasks-review-freshness
      description: "Review log post-dates file modification"
      detection: review_freshness
      glob_pattern: "tasks/TASK-*-*.md"
      review_pattern: "REVIEW-task-*"
      severity: WARN

    - id: tasks-upstream-freshness
      description: "Doc's Last Updated is newer than upstream doc's Last Updated"
      detection: upstream_freshness
      severity: FAIL
      upstream_field: "Implements"
      upstream_dir: "specs"
